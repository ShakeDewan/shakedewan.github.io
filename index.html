<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to shakedewan.com</title>
    <meta name="robots" content="noindex,follow">
    <meta name="description" content="This GitHub Pages site has moved to shakedewan.com.">
    <link rel="canonical" href="https://shakedewan.com/">
    <meta http-equiv="refresh" content="0; url=https://shakedewan.com/">
    <script>
        const target = new URL("https://shakedewan.com");
        target.pathname = window.location.pathname;
        target.search = window.location.search;
        target.hash = window.location.hash;
        window.location.replace(target.toString());
    </script>
    <style>
        :root {
            color-scheme: light;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, sans-serif;
            background: #f7f2eb;
            color: #172033;
        }

        main {
            max-width: 560px;
            padding: 32px;
            border: 1px solid rgba(23, 32, 51, 0.12);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.92);
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 2rem;
        }

        p {
            margin: 0;
            line-height: 1.55;
        }

        a {
            color: inherit;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <h1>Redirecting...</h1>
        <p>
            This site has moved to
            <a href="https://shakedewan.com/">shakedewan.com</a>.
        </p>
    </main>
</body>
</html>
