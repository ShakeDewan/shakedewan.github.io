<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to shakedewan.com</title>
    <meta name="robots" content="noindex,follow">
    <meta name="description" content="This GitHub Pages site has moved to shakedewan.com.">
    <link rel="canonical" href="https://shakedewan.com/">
    <script>
        const target = new URL("https://shakedewan.com");
        target.pathname = window.location.pathname;
        target.search = window.location.search;
        target.hash = window.location.hash;
        window.location.replace(target.toString());
    </script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f2eb;
            color: #172033;
        }
    </style>
</head>
<body></body>
</html>
